<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kupa 26">
<title>Kupa 26 | Dünya Kupası Takip</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="app-header">
  <div class="brand">
    <img class="brand-mark" src="icons/icon-64.png" width="30" height="30" alt="Kupa 26" decoding="async">
    <span>Kupa<b>26</b></span>
  </div>
  <div class="header-right">
    <span id="liveBadge" class="live-badge hidden"><span class="live-dot"></span>CANLI</span>
    <button id="btnRefresh" class="icon-btn" title="Yenile" aria-label="Yenile">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M20 12a8 8 0 1 1-2.34-5.66M20 4v4h-4"/></svg>
    </button>
    <button id="btnFavs" class="icon-btn" title="Favori Takımlar" aria-label="Favori Takımlar">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M12 3l2.9 5.9 6.1.9-4.5 4.4 1 6L12 17.8 6.5 20.2l1-6L3 9.8l6.1-.9z"/></svg>
    </button>
    <button id="btnSettings" class="icon-btn" title="Ayarlar" aria-label="Ayarlar">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
    </button>
  </div>
</header>

<main id="view" class="view"></main>

<nav class="tabbar">
  <button class="tab active" data-tab="matches">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><polygon points="12,8.5 15,10.7 13.9,14.2 10.1,14.2 9,10.7" fill="currentColor"/></svg>
    <span>Maçlar</span>
  </button>
  <button class="tab" data-tab="groups">
    <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 6h16M4 12h16M4 18h10"/></svg>
    <span>Gruplar</span>
  </button>
  <button class="tab" data-tab="bracket">
    <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 5h5v5H4zM4 14h5v5H4zM15 9.5h5v5h-5zM9 7.5h3v9M12 12h3"/></svg>
    <span>Eleme</span>
  </button>
  <button class="tab" data-tab="scorers">
    <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4ZM7 5H4v2a3 3 0 0 0 3 3M17 5h3v2a3 3 0 0 1-3 3"/></svg>
    <span>Golcüler</span>
  </button>
  <button class="tab" data-tab="league">
    <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L4.2 7.7l5.4-.8L12 2Z"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 21h12"/></svg>
    <span>Lig</span>
  </button>
</nav>

<div id="sheetOverlay" class="sheet-overlay hidden">
  <div id="sheet" class="sheet" role="dialog" aria-modal="true">
    <div class="sheet-handle" id="sheetHandle">
      <div class="sheet-grip"></div>
      <button id="sheetClose" class="sheet-close" aria-label="Kapat" title="Kapat">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div id="sheetContent" class="sheet-content"></div>
  </div>
</div>

<script type="module" src="lig.js"></script>
<script src="app.js"></script>
</body>
</html>
